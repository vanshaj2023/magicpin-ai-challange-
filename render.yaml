services:
  - type: web
    name: vera-bot
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/healthz
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-flash-latest
      - key: GEMINI_MIN_INTERVAL
        value: "5"
      - key: TICK_ACTION_BUDGET
        value: "3"
      - key: TEAM_NAME
        value: Solo Submission
      - key: CONTACT_EMAIL
        value: aggs1825@gmail.com
      - key: PYTHON_VERSION
        value: "3.12.4"
